[pytest]
# Collection is scoped to tests/ on purpose, and this file is protected.
#
# The agent may write into pipeline/. If pytest collected pipeline/, then a
# pipeline/conftest.py or pipeline/test_*.py written by the agent would be
# IMPORTED AND EXECUTED by a fence-allowed `make gate`, which is arbitrary code
# execution around the tool-layer fence. Scoping collection here closes that
# path, and `pytest` is not on the agent's bash allowlist so it cannot pass a
# path argument to override this.
testpaths = tests
norecursedirs = pipeline results .venv .git __pycache__ .pytest_cache
